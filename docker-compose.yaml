services:
  mongo:
    image: mongo:latest
    container_name: mongo-mingle-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    image: kashifhm333/mongo-mingle:v1
    container_name: mongo-mingle-app
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/mongoMingle
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo-data: